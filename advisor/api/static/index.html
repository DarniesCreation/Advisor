<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Model Advisor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1e1e2e;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #2d2d44;
        }
        
        .header {
            background: linear-gradient(90deg, #2d1b4e 0%, #1a1a2e 50%, #0f0f23 100%);
            color: #c084fc;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #2d2d44;
        }
        
        .header h1 { 
            font-size: 2em; 
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(192, 132, 252, 0.3);
        }
        
        .header p { 
            color: #a0a0b0;
        }
        
        #chat { 
            height: 500px; 
            overflow-y: auto; 
            padding: 20px;
            background: #16161e;
        }
        
        .message {
            margin: 15px 0;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user { 
            background: linear-gradient(135deg, #4c1d95 0%, #5b21b6 100%);
            color: #e9d5ff;
            margin-left: auto;
            padding: 12px 20px;
            border-radius: 20px 20px 5px 20px;
            width: fit-content;
            box-shadow: 0 4px 15px rgba(76, 29, 149, 0.3);
        }
        
        .bot { 
            margin-right: auto;
            color: #d0d0e0;
        }
        
        .input-area {
            display: flex;
            padding: 20px;
            gap: 10px;
            background: #1e1e2e;
            border-top: 1px solid #2d2d44;
        }
        
        input { 
            flex: 1;
            padding: 15px 20px;
            background: #16161e;
            border: 1px solid #2d2d44;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            color: #e0e0e0;
            transition: all 0.3s;
        }
        
        input:focus { 
            border-color: #7c3aed;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.2);
        }
        
        input::placeholder {
            color: #606070;
        }
        
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 100%);
            color: #e9d5ff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(76, 29, 149, 0.3);
        }
        
        button:hover { 
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }
        
        .typing {
            display: none;
            padding: 10px 20px;
            color: #7c3aed;
            font-style: italic;
        }
        
        .typing.active { display: block; }
        
        /* Стили для карточек моделей */
        .model-card {
            background: #1e1e2e;
            border-left: 3px solid #7c3aed;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .model-card h3 {
            color: #c084fc;
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        
        .model-card .company {
            color: #808090;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .model-card .price {
            color: #a78bfa;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .model-card .plus {
            color: #4ade80;
            margin-bottom: 8px;
        }
        
        .model-card .minus {
            color: #f87171;
            margin-bottom: 8px;
        }
        
        .model-card .explanation {
            color: #a0a0b0;
            font-size: 13px;
        }
        
        .model-card .tags {
            margin-top: 12px;
        }
        
        .model-card .tag {
            display: inline-block;
            background: #2d1b4e;
            color: #c084fc;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 5px;
        }
        
        .free-alternatives {
            background: #1a2e1a;
            border: 2px dashed #22c55e;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .free-alternatives h4 {
            color: #4ade80;
            margin-bottom: 15px;
        }
        
        .free-alternatives .free-item {
            color: #d0d0e0;
            margin: 8px 0;
            padding-left: 15px;
            border-left: 2px solid #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Model Advisor</h1>
            <p>Опиши задачу — подберу лучшую AI-модель</p>
        </div>
        
        <div id="chat">
            <div class="message bot">
                Привет! 👋 Опиши свою задачу, например: "Нужно написать код на Python"
            </div>
        </div>
        
        <div class="typing" id="typing">🤔 Думаю...</div>
        
        <div class="input-area">
            <input type="text" id="msg" placeholder="Опиши задачу..." autocomplete="off">
            <button onclick="send()">Отправить</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const msgInput = document.getElementById('msg');
        const typing = document.getElementById('typing');

        function add(text, cls, isHTML = false) {
            const div = document.createElement('div');
            div.className = 'message ' + cls;
            if (isHTML) {
                div.innerHTML = text;
            } else {
                div.textContent = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const text = msgInput.value.trim();
            if (!text) return;

            add(text, 'user');
            msgInput.value = '';
            typing.classList.add('active');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text, history: []})
                });
                const data = await res.json();
                add(data.response, 'bot', true);
            } catch (err) {
                add('❌ Ошибка: ' + err.message, 'bot');
            } finally {
                typing.classList.remove('active');
            }
        }

        msgInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
